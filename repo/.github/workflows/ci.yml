name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: error

jobs:
  # ── Job 1: type-check + unit + no-DB integration tests ─────────────────────
  test-no-db:
    name: Unit & no-DB integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --package backend

      - name: Unit + no-DB integration tests
        run: cargo test --package backend -- --nocapture

  # ── Job 2: DB-dependent integration tests ──────────────────────────────────
  test-db:
    name: DB integration tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: brewflow_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      CI: "true"
      TEST_DATABASE_URL: mysql://root:root@127.0.0.1:3306/brewflow_test
      COOKIE_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      ENCRYPTION_KEY: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Apply schema migrations
        run: |
          for f in $(ls database/migrations/*.sql | sort); do
            echo "Applying $f"
            mysql -h 127.0.0.1 -u root -proot brewflow_test < "$f"
          done

      - name: Apply CI test users
        run: mysql -h 127.0.0.1 -u root -proot brewflow_test < database/test_users.sql

      - name: All tests (DB-dependent tests are exercised)
        run: cargo test --package backend -- --nocapture
