server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed Brotli/gzip WASM/JS files when available
    gzip_static on;

    # All routes fall back to index.html for client-side (Dioxus) routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache fingerprinted assets aggressively; never cache the HTML entry point
    location ~* \.(wasm|js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
